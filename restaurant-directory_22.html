<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurants GOAT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* Miro brand tokens */
  :root {
    --miro-yellow: #FFD02F;
    --miro-yellow-hover: #F5C400;
    --miro-dark: #1A1A2E;
    --miro-text: #050038;
    --miro-text-secondary: #6E6E8A;
    --miro-border: #E6E6F0;
    --miro-bg: #F5F5FA;
    --miro-white: #FFFFFF;
    --miro-red: #D92B2B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--miro-bg); color: var(--miro-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header — Miro yellow bar */
  header { background: var(--miro-yellow); color: var(--miro-text); padding: 11px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-bottom: 2px solid var(--miro-yellow-hover); }
  header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--miro-text); }
  .count-pill { margin-left: auto; background: var(--miro-text); color: var(--miro-yellow); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.01em; }

  /* Filters */
  .filters { background: var(--miro-white); border-bottom: 1px solid var(--miro-border); padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .filter-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--miro-text-secondary); }
  select { border: 1.5px solid var(--miro-border); background: var(--miro-white); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--miro-text); cursor: pointer; outline: none; font-family: inherit; }
  select:focus { border-color: var(--miro-yellow); }
  .toggle-btn { border: 1.5px solid var(--miro-border); background: var(--miro-white); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--miro-text-secondary); cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; transition: all 0.15s; }
  .toggle-btn.active { background: var(--miro-yellow); border-color: var(--miro-yellow-hover); color: var(--miro-text); font-weight: 700; }
  .reset-btn { background: none; border: 1.5px solid var(--miro-border); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--miro-text-secondary); cursor: pointer; margin-left: auto; font-family: inherit; }
  .reset-btn:hover { background: var(--miro-bg); }

  /* Layout */
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; z-index: 1; }

  /* Sidebar */
  .sidebar { width: 288px; background: var(--miro-white); border-left: 1px solid var(--miro-border); overflow-y: auto; flex-shrink: 0; }
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--miro-border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--miro-text-secondary); position: sticky; top: 0; background: var(--miro-white); z-index: 10; }
  .restaurant-card { padding: 12px 16px; border-bottom: 1px solid var(--miro-border); cursor: pointer; transition: background 0.12s; }
  .restaurant-card:hover { background: var(--miro-bg); }
  .restaurant-card.active { background: #FFFBE6; border-left: 3px solid var(--miro-yellow); padding-left: 13px; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--miro-text); margin-bottom: 4px; line-height: 1.3; }
  .card-meta { font-size: 11px; color: var(--miro-text-secondary); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .card-city { background: #EBEBF0; color: #4A4A6A; padding: 1px 6px; border-radius: 4px; font-weight: 600; font-size: 10px; }
  .card-rating { color: #B8860B; font-weight: 700; }
  .empty-state { padding: 32px 16px; text-align: center; color: var(--miro-text-secondary); font-size: 12px; }

  /* Popup */
  .popup-inner { padding: 16px; min-width: 230px; max-width: 270px; }
  .popup-name { font-size: 14px; font-weight: 700; color: var(--miro-text); margin-bottom: 2px; line-height: 1.3; }
  .popup-sub { font-size: 11px; color: var(--miro-text-secondary); margin-bottom: 10px; }
  .popup-row { font-size: 11px; color: #444; margin-bottom: 4px; display: flex; gap: 6px; }
  .popup-row strong { color: var(--miro-text); min-width: 55px; font-size: 11px; }
  .popup-notes { font-size: 11px; color: #555; background: var(--miro-bg); padding: 8px 10px; border-radius: 8px; margin-top: 10px; line-height: 1.5; border-left: 3px solid var(--miro-yellow); }
  .popup-rating { display: inline-flex; align-items: center; gap: 3px; background: #FFFBE6; border: 1.5px solid var(--miro-yellow); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: #8A6A00; margin-top: 8px; }
  .popup-links { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; }
  .popup-link { display: block; text-align: center; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700; text-decoration: none; letter-spacing: 0.01em; transition: opacity 0.15s; }
  .popup-link:hover { opacity: 0.85; }
  .popup-link.gmaps { background: var(--miro-yellow); color: var(--miro-text); }
  .popup-link.website { background: var(--miro-text); color: var(--miro-white); }
  .popup-link.menu { background: var(--miro-bg); color: var(--miro-text); border: 1.5px solid var(--miro-border); }
  .closed-badge { display: inline-block; background: #FDECEA; color: var(--miro-red); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-top: 6px; }
  .private-badge { display: inline-block; background: #FFFBE6; color: #8A6A00; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-top: 6px; margin-left: 4px; border: 1px solid var(--miro-yellow); }
  .location-search { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--miro-border); border-radius: 8px; overflow: visible; background: var(--miro-white); position: relative; }
  .location-search input { border: none; outline: none; padding: 5px 10px; font-size: 12px; color: var(--miro-text); font-family: inherit; width: 200px; background: transparent; border-radius: 8px 0 0 8px; }
  .location-search input::placeholder { color: var(--miro-text-secondary); }
  .location-search button { background: var(--miro-yellow); border: none; padding: 5px 10px; cursor: pointer; font-size: 13px; display: flex; align-items: center; border-left: 1.5px solid var(--miro-yellow-hover); border-radius: 0 6px 6px 0; }
  .location-search button:hover { background: var(--miro-yellow-hover); }
  .location-suggestions { position: absolute; top: calc(100% + 4px); left: 0; width: 320px; background: var(--miro-white); border: 1.5px solid var(--miro-border); border-radius: 8px; box-shadow: 0 4px 16px rgba(5,0,56,0.1); z-index: 9999; overflow: hidden; display: none; }
  .location-suggestions.visible { display: block; }
  .suggestion-item { padding: 9px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--miro-border); color: var(--miro-text); line-height: 1.4; }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--miro-bg); }
  .suggestion-item strong { display: block; font-weight: 600; margin-bottom: 1px; }
  .suggestion-item span { color: var(--miro-text-secondary); font-size: 11px; }
</style>
</head>
<body>

<header>
  <span style="font-size:16px">🍽️</span>
  <h1>Restaurants GOAT</h1>
  <span class="count-pill" id="count-pill">34 restaurants</span>
</header>

<div class="filters">
  <span class="filter-label">Filter by</span>
  <select id="filter-city"><option value="">All cities</option></select>
  <select id="filter-cuisine"><option value="">All cuisines</option></select>
  <button class="toggle-btn" id="filter-private" onclick="togglePrivate()">🔒 Private space</button>
  <div class="location-search" id="location-search-wrap">
    <input type="text" id="location-input" placeholder="📍 Go to address or place..." onkeydown="if(event.key==='Enter') searchLocation()" oninput="fetchSuggestions()"/>
    <button onclick="searchLocation()">→</button>
    <div class="location-suggestions" id="location-suggestions"></div>
  </div>
  <button class="reset-btn" onclick="resetFilters()">↺ Reset</button>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header">All restaurants</div>
    <div id="restaurant-list"></div>
  </div>

  { name: "Miro New York Hub", address: "185 Madison Avenue, Floor 4, New York, NY 10016", coords: [40.7469, -73.9836], color: "#FFD02F" }

  "Hasta La Vista, Baby": [52.3530, 4.8780], "Strandzuid": [52.3365, 4.8883],

};

let map, activeIndex = null, filteredList = [], markerObjects = {}, privateFilter = false;

map = L.map('map').setView([48, 10], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap © CARTO', maxZoom: 19 }).addTo(map);

function makeIcon(closed) {
  const color = closed ? '#c0392b' : '#1a1a1a';
  return L.divIcon({
    className: '',
    html: `<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg"><path d="M13 0C5.82 0 0 5.82 0 13c0 8.67 13 21 13 21S26 21.67 26 13C26 5.82 20.18 0 13 0z" fill="${color}"/><circle cx="13" cy="13" r="7" fill="rgba(255,255,255,0.25)"/><text x="13" y="17" text-anchor="middle" font-size="10" fill="white">🍽</text></svg>`,
    iconSize: [26, 34], iconAnchor: [13, 34], popupAnchor: [0, -34]
  });
}

function buildPopup(r) {
  const badges = [];
  if (!r.open) badges.push('<span class="closed-badge">⚠️ Check if open</span>');
  if (r.privateSpace) badges.push('<span class="private-badge">🔒 Private space</span>');
  return `<div class="popup-inner">
    <div class="popup-name">${r.name}</div>
    <div class="popup-sub">${r.city} · ${r.cuisine}</div>
    ${r.addedBy ? `<div class="popup-row"><strong>Added by</strong>${r.addedBy}</div>` : ''}
    ${r.address ? `<div class="popup-row"><strong>Address</strong>${r.address}</div>` : ''}
    ${r.rating ? `<div class="popup-rating">⭐ ${r.rating}</div>` : ''}
    ${badges.length ? `<div style="margin-top:6px">${badges.join('')}</div>` : ''}
    ${r.notes ? `<div class="popup-notes">${r.notes}</div>` : ''}
    <div class="popup-links">
      <a class="popup-link gmaps" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name + ' ' + r.city)}" target="_blank">📍 Open in Google Maps</a>
      ${r.website ? `<a class="popup-link website" href="${r.website}" target="_blank">🌐 Visit website</a>` : ''}
      ${r.menu ? `<a class="popup-link menu" href="${r.menu}" target="_blank">📋 View menu</a>` : ''}
    </div>
  </div>`;
}

function renderSidebar(list) {
  filteredList = list;
  const el = document.getElementById('restaurant-list');
  document.getElementById('count-pill').textContent = list.length + ' restaurant' + (list.length !== 1 ? 's' : '');
  document.getElementById('sidebar-header').textContent = list.length + ' restaurant' + (list.length !== 1 ? 's' : '');
  if (!list.length) { el.innerHTML = '<div class="empty-state">No restaurants match your filters</div>'; return; }
  el.innerHTML = list.map((r, i) => `
    <div class="restaurant-card${activeIndex === i ? ' active' : ''}" id="card-${i}" onclick="focusCard(${i})">
      <div class="card-name">${r.name}${!r.open ? ' ⚠️' : ''}</div>
      <div class="card-meta">
        <span class="card-city">${r.city}</span>
        <span>${r.cuisine}</span>
        ${r.rating ? `<span class="card-rating">⭐ ${r.rating}</span>` : ''}
      </div>
    </div>`).join('');
}

function focusCard(i) {
  if (activeIndex !== null) { const prev = document.getElementById('card-' + activeIndex); if (prev) prev.classList.remove('active'); }
  activeIndex = i;
  const card = document.getElementById('card-' + i);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  const r = filteredList[i];
  const marker = markerObjects[r.name];
  if (marker) { map.setView(marker.getLatLng(), 15, { animate: true }); marker.openPopup(); }
}

function buildFilters() {
  const cities = [...new Set(RESTAURANTS.map(r => r.city))].sort();
  const cuisines = [...new Set(RESTAURANTS.map(r => r.cuisine))].sort();
  const cs = document.getElementById('filter-city');
  const cu = document.getElementById('filter-cuisine');
  cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cs.appendChild(o); });
  cuisines.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cu.appendChild(o); });
  cs.addEventListener('change', applyFilters);
  cu.addEventListener('change', applyFilters);
}

function togglePrivate() {
  privateFilter = !privateFilter;
  document.getElementById('filter-private').classList.toggle('active', privateFilter);
  applyFilters();
}

function applyFilters() {
  const city = document.getElementById('filter-city').value;
  const cuisine = document.getElementById('filter-cuisine').value;
  const filtered = RESTAURANTS.filter(r =>
    (!city || r.city === city) &&
    (!cuisine || r.cuisine === cuisine) &&
    (!privateFilter || r.privateSpace)
  );
  Object.values(markerObjects).forEach(m => map.removeLayer(m));
  filtered.forEach(r => { const m = markerObjects[r.name]; if (m) m.addTo(map); });
  activeIndex = null;
  renderSidebar(filtered);
  if (filtered.length) {
    const coords = filtered.map(r => COORDS[r.name]).filter(Boolean);
    if (coords.length) map.fitBounds(coords, { padding: [40, 40] });
  }
}

function resetFilters() {
  document.getElementById('filter-city').value = '';
  document.getElementById('filter-cuisine').value = '';
  document.getElementById('location-input').value = '';
  if (poiMarker) { map.removeLayer(poiMarker); poiMarker = null; }
  privateFilter = false;
  document.getElementById('filter-private').classList.remove('active');
  applyFilters();
}

let suggestTimer = null;

async function fetchSuggestions() {
  const input = document.getElementById('location-input').value.trim();
  const box = document.getElementById('location-suggestions');
  if (input.length < 3) { box.classList.remove('visible'); return; }
  clearTimeout(suggestTimer);
  suggestTimer = setTimeout(async () => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)}&format=json&limit=5&addressdetails=1`, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      if (!data.length) { box.classList.remove('visible'); return; }
      box.innerHTML = data.map((r, i) => {
        const name = r.display_name.split(',')[0];
        const detail = r.display_name.split(',').slice(1, 3).join(',').trim();
        return `<div class="suggestion-item" onclick="selectSuggestion(${r.lat}, ${r.lon}, '${name.replace(/'/g,"\\'")}')"><strong>${name}</strong><span>${detail}</span></div>`;
      }).join('');
      box.classList.add('visible');
    } catch(e) {}
  }, 300);
}

let poiMarker = null;

function selectSuggestion(lat, lng, name) {
  document.getElementById('location-input').value = name;
  document.getElementById('location-suggestions').classList.remove('visible');
  
  // Remove existing POI marker
  if (poiMarker) { map.removeLayer(poiMarker); poiMarker = null; }

  const poiIcon = L.divIcon({
    className: '',
    html: `<div style="
      background: #FF3B30;
      border: 3px solid #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      animation: pulse 1.5s ease-in-out infinite;
    "></div>
    <style>
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.5); }
        70% { box-shadow: 0 0 0 10px rgba(255,59,48,0); }
        100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
      }
    </style>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
    popupAnchor: [0, -14]
  });

  poiMarker = L.marker([parseFloat(lat), parseFloat(lng)], { icon: poiIcon, zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup(`<div class="popup-inner"><div class="popup-name">📍 ${name}</div><div class="popup-sub" style="margin-top:4px">Your point of interest</div></div>`)
    .openPopup();

  map.setView([parseFloat(lat), parseFloat(lng)], 15, { animate: true });
}

async function searchLocation() {
  const input = document.getElementById('location-input').value.trim();
  if (!input) return;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)}&format=json&limit=1`, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (data && data.length > 0) {
      selectSuggestion(data[0].lat, data[0].lon, data[0].display_name.split(',')[0]);
    } else {
      alert('Location not found — try a different search term.');
    }
  } catch(e) { alert('Search failed — please try again.'); }
}

// Close suggestions when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('location-search-wrap').contains(e.target)) {
    document.getElementById('location-suggestions').classList.remove('visible');
  }
});

buildFilters();
RESTAURANTS.forEach(r => {
  const coords = COORDS[r.name];
  if (!coords) return;
  const marker = L.marker(coords, { icon: makeIcon(!r.open) }).addTo(map);
  marker.bindPopup(buildPopup(r), { maxWidth: 280 });
  marker.on('click', () => { const idx = filteredList.indexOf(r); if (idx >= 0) focusCard(idx); });
  markerObjects[r.name] = marker;
});

renderSidebar(RESTAURANTS);
const allCoords = RESTAURANTS.map(r => COORDS[r.name]).filter(Boolean);

// Add office pins
OFFICE_PINS.forEach(o => {
  const icon = L.divIcon({
    className: '',
    html: `<svg width="30" height="38" viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 23 15 23S30 25 30 15C30 6.72 23.28 0 15 0z" fill="${o.color}"/>
      <circle cx="15" cy="15" r="8" fill="rgba(0,0,0,0.15)"/>
      <text x="15" y="20" text-anchor="middle" font-size="12" fill="#1a1a1a">🏢</text>
    </svg>`,
    iconSize: [30, 38], iconAnchor: [15, 38], popupAnchor: [0, -38]
  });
  L.marker(o.coords, { icon })
    .addTo(map)
    .bindPopup(`<div class="popup-inner">
      <div class="popup-name">${o.name}</div>
      <div class="popup-sub">Amsterdam · Miro Office</div>
      <div class="popup-row"><strong>Address</strong>${o.address}</div>
      <div class="popup-links">
        <a class="popup-link gmaps" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.address)}" target="_blank">📍 Open in Google Maps</a>
      </div>
    </div>`, { maxWidth: 280 });
  allCoords.push(o.coords);
});
if (allCoords.length) map.fitBounds(allCoords, { padding: [40, 40] });
</script>
</body>
