<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurants GOAT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --y:#FFD02F; --yh:#F5C400; --t:#050038; --ts:#6E6E8A; --b:#E6E6F0; --bg:#F5F5FA; --w:#FFFFFF; --r:#D92B2B; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--t); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:var(--y); padding:11px 20px; display:flex; align-items:center; gap:10px; flex-shrink:0; border-bottom:2px solid var(--yh); }
  header h1 { font-size:14px; font-weight:700; letter-spacing:-0.01em; flex:1; }
  .upload-btn { background:var(--t); color:var(--y); border:none; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .upload-btn:hover { background:#1a1a3a; }
  .pill { background:rgba(0,0,0,0.15); color:var(--t); font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
  .filters { background:var(--w); border-bottom:1px solid var(--b); padding:8px 16px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex-shrink:0; }
  .fl { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--ts); }
  select { border:1.5px solid var(--b); background:var(--w); border-radius:8px; padding:5px 10px; font-size:12px; color:var(--t); cursor:pointer; outline:none; font-family:inherit; }
  select:focus { border-color:var(--y); }
  .tbtn { border:1.5px solid var(--b); background:var(--w); border-radius:8px; padding:5px 12px; font-size:12px; color:var(--ts); cursor:pointer; display:flex; align-items:center; gap:5px; font-family:inherit; transition:all 0.15s; }
  .tbtn.on { background:var(--y); border-color:var(--yh); color:var(--t); font-weight:700; }
  .rbtn { background:none; border:1.5px solid var(--b); border-radius:8px; padding:5px 12px; font-size:12px; color:var(--ts); cursor:pointer; margin-left:auto; font-family:inherit; }
  .ls { display:flex; align-items:center; border:1.5px solid var(--b); border-radius:8px; overflow:visible; background:var(--w); position:relative; }
  .ls input { border:none; outline:none; padding:5px 10px; font-size:12px; color:var(--t); font-family:inherit; width:200px; background:transparent; border-radius:8px 0 0 8px; }
  .ls input::placeholder { color:var(--ts); }
  .ls button { background:var(--y); border:none; padding:5px 10px; cursor:pointer; font-size:13px; border-left:1.5px solid var(--yh); border-radius:0 6px 6px 0; }
  .sugg { position:absolute; top:calc(100% + 4px); left:0; width:320px; background:var(--w); border:1.5px solid var(--b); border-radius:8px; box-shadow:0 4px 16px rgba(5,0,56,0.1); z-index:9999; overflow:hidden; display:none; }
  .sugg.on { display:block; }
  .si { padding:9px 12px; font-size:12px; cursor:pointer; border-bottom:1px solid var(--b); color:var(--t); line-height:1.4; }
  .si:last-child { border-bottom:none; }
  .si:hover { background:var(--bg); }
  .si strong { display:block; font-weight:600; margin-bottom:1px; }
  .si span { color:var(--ts); font-size:11px; }
  .main { display:flex; flex:1; overflow:hidden; }
  #map { flex:1; z-index:1; }
  .sb { width:288px; background:var(--w); border-left:1px solid var(--b); overflow-y:auto; flex-shrink:0; }
  .sbh { padding:12px 16px; border-bottom:1px solid var(--b); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--ts); position:sticky; top:0; background:var(--w); z-index:10; }
  .rc { padding:12px 16px; border-bottom:1px solid var(--b); cursor:pointer; transition:background 0.12s; }
  .rc:hover { background:var(--bg); }
  .rc.on { background:#FFFBE6; border-left:3px solid var(--y); padding-left:13px; }
  .rn { font-size:13px; font-weight:600; color:var(--t); margin-bottom:4px; line-height:1.3; }
  .rm { font-size:11px; color:var(--ts); display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .ct { background:#EBEBF0; color:#4A4A6A; padding:1px 6px; border-radius:4px; font-weight:600; font-size:10px; }
  .rt { color:#B8860B; font-weight:700; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:16px; padding:32px; text-align:center; }
  .empty-icon { font-size:48px; }
  .empty-title { font-size:15px; font-weight:700; color:var(--t); }
  .empty-sub { font-size:12px; color:var(--ts); line-height:1.6; }
  .empty-upload-btn { background:var(--y); border:none; border-radius:8px; padding:10px 20px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .progress-wrap { background:var(--w); border-bottom:1px solid var(--b); padding:10px 16px; display:none; align-items:center; gap:12px; flex-shrink:0; }
  .progress-wrap.on { display:flex; }
  .progress-bar { flex:1; background:var(--b); border-radius:4px; height:6px; }
  .progress-fill { background:var(--y); height:6px; border-radius:4px; width:0%; transition:width 0.3s; }
  .progress-text { font-size:11px; color:var(--ts); white-space:nowrap; }
  .es { padding:32px 16px; text-align:center; color:var(--ts); font-size:12px; }
  .pi { padding:16px; min-width:230px; max-width:270px; }
  .pn { font-size:14px; font-weight:700; color:var(--t); margin-bottom:2px; line-height:1.3; }
  .ps { font-size:11px; color:var(--ts); margin-bottom:10px; }
  .pr { font-size:11px; color:#444; margin-bottom:4px; display:flex; gap:6px; }
  .pr strong { color:var(--t); min-width:55px; font-size:11px; }
  .pno { font-size:11px; color:#555; background:var(--bg); padding:8px 10px; border-radius:8px; margin-top:10px; line-height:1.5; border-left:3px solid var(--y); }
  .pra { display:inline-flex; align-items:center; gap:3px; background:#FFFBE6; border:1.5px solid var(--y); border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; color:#8A6A00; margin-top:8px; }
  .pl { display:flex; flex-direction:column; gap:5px; margin-top:12px; }
  .pl a { display:block; text-align:center; padding:8px; border-radius:8px; font-size:11px; font-weight:700; text-decoration:none; transition:opacity 0.15s; }
  .pl a:hover { opacity:0.85; }
  .gm { background:var(--y); color:var(--t); }
  .ws { background:var(--t); color:var(--w); }
  .mn { background:var(--bg); color:var(--t); border:1.5px solid var(--b); }
  .cb { display:inline-block; background:#FDECEA; color:var(--r); font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; margin-top:6px; }
  .pb { display:inline-block; background:#FFFBE6; color:#8A6A00; font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; margin-top:6px; margin-left:4px; border:1px solid var(--y); }
  .leaflet-popup-content-wrapper { border-radius:12px; box-shadow:0 4px 24px rgba(5,0,56,0.12); border:none; }
  .leaflet-popup-content { margin:0!important; padding:0!important; }
</style>
</head>
<body>
<header>
  <span style="font-size:16px">🍽️</span>
  <h1>Restaurants GOAT</h1>
  <span class="pill" id="pill">No data loaded</span>
  <button class="upload-btn" onclick="document.getElementById('csvInput').click()">⬆ Upload CSV</button>
  <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleCSV(event)"/>
</header>
<div class="filters">
  <span class="fl">Filter by</span>
  <select id="fc"><option value="">All cities</option></select>
  <select id="fcu"><option value="">All cuisines</option></select>
  <button class="tbtn" id="fp" onclick="togglePrivate()">🔒 Private space</button>
  <div class="ls" id="lsw">
    <input id="li" placeholder="📍 Go to address or place..." oninput="fetchSugg()" onkeydown="if(event.key==='Enter')doSearch()"/>
    <button onclick="doSearch()">→</button>
    <div class="sugg" id="sugg"></div>
  </div>
  <button class="rbtn" onclick="reset()">↺ Reset</button>
</div>
<div class="progress-wrap" id="progwrap">
  <div class="progress-bar"><div class="progress-fill" id="progfill"></div></div>
  <span class="progress-text" id="progtext">Loading...</span>
</div>
<div class="main">
  <div id="map"></div>
  <div class="sb">
    <div class="sbh" id="sbh">Restaurants</div>
    <div id="rl">
      <div class="empty-state">
        <div class="empty-icon">🍽️</div>
        <div class="empty-title">No restaurants loaded</div>
        <div class="empty-sub">Export your Google Sheet as a CSV and upload it using the button in the top right to get started.</div>
        <button class="empty-upload-btn" onclick="document.getElementById('csvInput').click()">⬆ Upload CSV</button>
      </div>
    </div>
  </div>
</div>

<script>
const OFFICES = [
  {name:"Miro Amsterdam Hub",address:"Fred. Roeskestraat 100, 1076 ED Amsterdam",coords:[52.3418,4.8698]},
  {name:"Miro New York Hub",address:"185 Madison Avenue, Floor 4, New York, NY 10016",coords:[40.7469,-73.9836]}
];

let map, all=[], filtered=[], markers={}, active=null, privF=false, poi=null, stimer=null;

map = L.map('map').setView([48,10],4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);

// Add office pins on load
OFFICES.forEach(o=>{
  L.marker(o.coords,{icon:offIcon(),zIndexOffset:500}).addTo(map)
    .bindPopup('<div class="pi"><div class="pn">'+o.name+'</div><div class="ps">Miro Office</div><div class="pr"><strong>Address</strong>'+o.address+'</div><div class="pl"><a class="gm" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(o.address)+'" target="_blank">📍 Open in Google Maps</a></div></div>',{maxWidth:280});
});

function mkIcon(closed){
  const c=closed?'#D92B2B':'#1a1a1a';
  return L.divIcon({className:'',html:'<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg"><path d="M13 0C5.82 0 0 5.82 0 13c0 8.67 13 21 13 21S26 21.67 26 13C26 5.82 20.18 0 13 0z" fill="'+c+'"/><circle cx="13" cy="13" r="7" fill="rgba(255,255,255,0.2)"/><text x="13" y="17" text-anchor="middle" font-size="10" fill="white">🍽</text></svg>',iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-34]});
}
function offIcon(){
  return L.divIcon({className:'',html:'<svg width="30" height="38" viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg"><path d="M15 0C6.72 0 0 6.72 0 15c0 10 15 23 15 23S30 25 30 15C30 6.72 23.28 0 15 0z" fill="#FFD02F"/><circle cx="15" cy="15" r="8" fill="rgba(0,0,0,0.1)"/><text x="15" y="20" text-anchor="middle" font-size="12" fill="#050038">🏢</text></svg>',iconSize:[30,38],iconAnchor:[15,38],popupAnchor:[0,-38]});
}

function extractUrl(cell){
  if(!cell) return '';
  cell = cell.trim();
  const m=cell.match(/[?&]q=(https?:\/\/[^&]+)/);
  if(m) return decodeURIComponent(m[1]);
  if(cell.startsWith('http')) return cell;
  return '';
}

function mkPopup(r){
  const gm='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(r.name+' '+r.city);
  return '<div class="pi"><div class="pn">'+r.name+'</div><div class="ps">'+r.city+(r.cuisine?' · '+r.cuisine:'')+'</div>'
    +(r.addedBy?'<div class="pr"><strong>Added by</strong>'+r.addedBy+'</div>':'')
    +(r.address?'<div class="pr"><strong>Address</strong>'+r.address+'</div>':'')
    +(r.rating?'<div class="pra">⭐ '+r.rating+'</div>':'')
    +(!r.open?'<span class="cb">⚠️ Check if open</span>':'')
    +(r.priv?'<span class="pb">🔒 Private space</span>':'')
    +(r.notes?'<div class="pno">'+r.notes+'</div>':'')
    +'<div class="pl"><a class="gm" href="'+gm+'" target="_blank">📍 Open in Google Maps</a>'
    +(r.website?'<a class="ws" href="'+r.website+'" target="_blank">🌐 Visit website</a>':'')
    +(r.menu?'<a class="mn" href="'+r.menu+'" target="_blank">📋 View menu</a>':'')
    +'</div></div>';
}

function parseCSV(text){
  const lines = text.split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
  const rows = [];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    // Handle quoted fields
    const cols = [];
    let cur='', inQ=false;
    for(let c=0;c<lines[i].length;c++){
      const ch=lines[i][c];
      if(ch==='"'){ inQ=!inQ; }
      else if(ch===','&&!inQ){ cols.push(cur.trim()); cur=''; }
      else { cur+=ch; }
    }
    cols.push(cur.trim());
    const row = {};
    headers.forEach((h,idx)=>{ row[h]=cols[idx]||''; });
    rows.push(row);
  }
  return rows;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function geocode(address, city){
  const query = (address && address.length>5 ? address : city)+', '+city;
  try{
    const res = await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(query)+'&format=json&limit=1',{headers:{'Accept-Language':'en'}});
    if(!res.ok) return null;
    const data = await res.json();
    if(data&&data.length>0) return [parseFloat(data[0].lat),parseFloat(data[0].lon)];
  }catch(e){}
  return null;
}

async function handleCSV(event){
  const file = event.target.files[0];
  if(!file) return;
  const text = await file.text();
  const rows = parseCSV(text);

  // Clear existing markers
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  all=[];
  filtered=[];
  active=null;

  // Reset filters
  const fc=document.getElementById('fc'),fcu=document.getElementById('fcu');
  while(fc.options.length>1)fc.remove(1);
  while(fcu.options.length>1)fcu.remove(1);
  fc.removeEventListener('change',applyFilters);
  fcu.removeEventListener('change',applyFilters);

  // Show progress
  const progwrap=document.getElementById('progwrap');
  const progfill=document.getElementById('progfill');
  const progtext=document.getElementById('progtext');
  progwrap.classList.add('on');

  let loaded=0;
  const total=rows.length;

  for(const row of rows){
    const name=(row['name']||row['name ']||'').trim();
    if(!name) continue;

    const r = {
      name,
      address:(row['address']||'').trim(),
      city:(row['city']||'').trim(),
      cuisine:(row['cuisine']||'').trim(),
      priv:(row['private space']||'').toLowerCase()==='yes',
      addedBy:(row['recommended by']||'').trim(),
      notes:(row['notes']||'').trim(),
      rating:(row['google rating']||'').trim(),
      open:(row['still open?']||'').toLowerCase()!=='no',
      menu:extractUrl(row['menu']||''),
      website:extractUrl(row['website']||'')
    };

    loaded++;
    progfill.style.width=Math.round((loaded/total)*100)+'%';
    progtext.textContent='Locating '+loaded+' of '+total+': '+name;

    const coords = await geocode(r.address, r.city);
    if(!coords){ await sleep(500); continue; }

    r.coords=coords;
    const m=L.marker(coords,{icon:mkIcon(!r.open)}).addTo(map);
    m.bindPopup(mkPopup(r),{maxWidth:280});
    m.on('click',()=>{const i=filtered.indexOf(r);if(i>=0)focusCard(i);});
    markers[r.name]=m;
    all.push(r);

    buildFilters();
    renderSidebar(all);

    if(all.length===1) map.setView(coords,13);
    else {
      const bounds=all.map(r=>r.coords).filter(Boolean);
      if(bounds.length>1) map.fitBounds(bounds,{padding:[40,40]});
    }

    // Pace requests — 600ms normally, 2s every 10
    await sleep(loaded%10===0 ? 2000 : 600);
  }

  progwrap.classList.remove('on');
  document.getElementById('pill').textContent=all.length+' restaurants';

  const bounds=[...all.map(r=>r.coords).filter(Boolean),...OFFICES.map(o=>o.coords)];
  if(bounds.length) map.fitBounds(bounds,{padding:[40,40]});

  // Reset file input so same file can be re-uploaded
  event.target.value='';
}

function buildFilters(){
  const cities=[...new Set(all.map(r=>r.city).filter(Boolean))].sort();
  const cuisines=[...new Set(all.map(r=>r.cuisine).filter(Boolean))].sort();
  const fc=document.getElementById('fc'),fcu=document.getElementById('fcu');
  while(fc.options.length>1)fc.remove(1);
  while(fcu.options.length>1)fcu.remove(1);
  cities.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fc.appendChild(o);});
  cuisines.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fcu.appendChild(o);});
  fc.addEventListener('change',applyFilters);
  fcu.addEventListener('change',applyFilters);
}

function renderSidebar(list){
  filtered=list;
  document.getElementById('pill').textContent=list.length+' restaurant'+(list.length!==1?'s':'');
  document.getElementById('sbh').textContent=list.length+' restaurant'+(list.length!==1?'s':'');
  const el=document.getElementById('rl');
  if(!list.length){el.innerHTML='<div class="es">No restaurants match your filters</div>';return;}
  el.innerHTML=list.map((r,i)=>'<div class="rc'+(active===i?' on':'')+'" id="c'+i+'" onclick="focusCard('+i+')">'
    +'<div class="rn">'+r.name+(!r.open?' ⚠️':'')+'</div>'
    +'<div class="rm"><span class="ct">'+r.city+'</span>'
    +(r.cuisine?'<span>'+r.cuisine+'</span>':'')
    +(r.rating?'<span class="rt">⭐ '+r.rating+'</span>':'')
    +(r.priv?'<span title="Private space">🔒</span>':'')
    +'</div></div>').join('');
}

function focusCard(i){
  if(active!==null){const p=document.getElementById('c'+active);if(p)p.classList.remove('on');}
  active=i;
  const c=document.getElementById('c'+i);
  if(c){c.classList.add('on');c.scrollIntoView({behavior:'smooth',block:'nearest'});}
  const r=filtered[i];
  const m=markers[r.name];
  if(m){map.setView(m.getLatLng(),15,{animate:true});m.openPopup();}
}

function applyFilters(){
  const city=document.getElementById('fc').value;
  const cuisine=document.getElementById('fcu').value;
  const f=all.filter(r=>(!city||r.city===city)&&(!cuisine||r.cuisine===cuisine)&&(!privF||r.priv));
  Object.values(markers).forEach(m=>map.removeLayer(m));
  f.forEach(r=>{if(markers[r.name])markers[r.name].addTo(map);});
  active=null;
  renderSidebar(f);
  if(f.length){const coords=f.map(r=>r.coords).filter(Boolean);if(coords.length)map.fitBounds(coords,{padding:[40,40]});}
}

function togglePrivate(){
  privF=!privF;
  document.getElementById('fp').classList.toggle('on',privF);
  applyFilters();
}

function reset(){
  document.getElementById('fc').value='';
  document.getElementById('fcu').value='';
  document.getElementById('li').value='';
  if(poi){map.removeLayer(poi);poi=null;}
  privF=false;
  document.getElementById('fp').classList.remove('on');
  applyFilters();
}

let suggTimer=null;
async function fetchSugg(){
  const v=document.getElementById('li').value.trim();
  const box=document.getElementById('sugg');
  if(v.length<3){box.classList.remove('on');return;}
  clearTimeout(suggTimer);
  suggTimer=setTimeout(async()=>{
    try{
      const res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(v)+'&format=json&limit=5&dedupe=1',{headers:{'Accept-Language':'en'}});
      const data=await res.json();
      if(!data||!data.length){box.classList.remove('on');return;}
      const seen=new Set();
      const items=data.filter(r=>{
        const k=r.display_name.split(',').slice(0,2).join(',').trim();
        if(seen.has(k))return false;
        seen.add(k);return true;
      });
      if(!items.length){box.classList.remove('on');return;}
      box.innerHTML=items.map(r=>{
        const n=r.display_name.split(',')[0];
        const d=r.display_name.split(',').slice(1,3).join(',').trim();
        return '<div class="si" onclick="pick(\''+r.lat+'\',\''+r.lon+'\',\''+n.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\')">'
          +'<strong>'+n+'</strong><span>'+d+'</span></div>';
      }).join('');
      box.classList.add('on');
    }catch(e){ box.classList.remove('on'); }
  },400);
}

function pick(lat,lng,name){
  document.getElementById('li').value=name;
  document.getElementById('sugg').classList.remove('on');
  if(poi){map.removeLayer(poi);poi=null;}
  const pi=L.divIcon({className:'',
    html:'<div style="background:#FF3B30;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 2px 8px rgba(0,0,0,0.35);animation:pulse 1.5s ease-in-out infinite"></div>'
    +'<style>@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,0.5)}70%{box-shadow:0 0 0 10px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}</style>',
    iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-14]});
  poi=L.marker([parseFloat(lat),parseFloat(lng)],{icon:pi,zIndexOffset:1000}).addTo(map)
    .bindPopup('<div class="pi"><div class="pn">📍 '+name+'</div><div class="ps">Your point of interest</div></div>').openPopup();
  map.setView([parseFloat(lat),parseFloat(lng)],15,{animate:true});
}

async function doSearch(){
  const v=document.getElementById('li').value.trim();
  if(!v)return;
  try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(v)+'&format=json&limit=1',{headers:{'Accept-Language':'en'}});
    const data=await res.json();
    if(data&&data.length>0) pick(data[0].lat,data[0].lon,data[0].display_name.split(',')[0]);
    else alert('Location not found — try a different search.');
  }catch(e){ alert('Search failed — check your connection.'); }
}

document.addEventListener('click',e=>{
  if(!document.getElementById('lsw').contains(e.target))
    document.getElementById('sugg').classList.remove('on');
});
</script>
